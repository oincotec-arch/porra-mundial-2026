<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Porra Mundial 2026</title>
  <meta name="theme-color" content="#0a0e1a">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Porra 2026">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
    :root {
      --bg: #0a0e1a;
      --surface: #141829;
      --surface2: #1e2340;
      --accent: #f59e0b;
      --green: #10b981;
      --red: #ef4444;
      --text: #f1f5f9;
      --text2: #64748b;
      --border: rgba(255,255,255,0.07);
      --radius: 14px;
    }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100dvh;
      display: flex;
      flex-direction: column;
      overflow-x: hidden;
    }
    /* ── HEADER ── */
    .header {
      background: linear-gradient(160deg, #0f172a 0%, #1a2035 100%);
      padding: 14px 18px 12px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      border-bottom: 1px solid var(--border);
      position: sticky;
      top: 0;
      z-index: 100;
    }
    .header-left h1 {
      font-size: 17px;
      font-weight: 800;
      background: linear-gradient(135deg, #f59e0b, #fbbf24);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      letter-spacing: -0.3px;
    }
    .header-left .sub {
      font-size: 11px;
      color: var(--text2);
      margin-top: 2px;
    }
    .refresh-btn {
      background: var(--surface2);
      border: 1px solid var(--border);
      color: var(--text2);
      border-radius: 10px;
      width: 38px;
      height: 38px;
      font-size: 18px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.2s;
      flex-shrink: 0;
    }
    .refresh-btn:active { transform: scale(0.9); }
    .refresh-btn.spinning { animation: spin 0.8s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }
    /* ── CONTENT ── */
    .content {
      flex: 1;
      overflow-y: auto;
      -webkit-overflow-scrolling: touch;
      padding-bottom: calc(72px + env(safe-area-inset-bottom));
    }
    /* ── BOTTOM NAV ── */
    .bottom-nav {
      position: fixed;
      bottom: 0; left: 0; right: 0;
      background: #0c1020;
      border-top: 1px solid var(--border);
      display: flex;
      padding-bottom: env(safe-area-inset-bottom);
      z-index: 100;
    }
    .nav-btn {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 10px 6px;
      cursor: pointer;
      color: var(--text2);
      font-size: 10px;
      font-weight: 600;
      gap: 3px;
      background: none;
      border: none;
      letter-spacing: 0.3px;
      transition: color 0.15s;
    }
    .nav-btn .icon { font-size: 21px; line-height: 1; }
    .nav-btn.active { color: var(--accent); }
    /* ── TABS ── */
    .tab { display: none; }
    .tab.active { display: block; }
    /* ── SECTION LABEL ── */
    .section-label {
      font-size: 11px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 1.2px;
      color: var(--text2);
      padding: 18px 18px 8px;
    }
    /* ── CARD ── */
    .card {
      background: var(--surface);
      border-radius: var(--radius);
      border: 1px solid var(--border);
      margin: 0 14px 4px;
      overflow: hidden;
    }
    /* ── RANKING ── */
    .rank-row {
      display: flex;
      align-items: center;
      padding: 13px 16px;
      border-bottom: 1px solid var(--border);
      gap: 13px;
      cursor: pointer;
      transition: background 0.1s;
    }
    .rank-row:last-child { border-bottom: none; }
    .rank-row:active { background: var(--surface2); }
    .rank-pos {
      font-size: 13px;
      font-weight: 700;
      width: 28px;
      text-align: center;
      flex-shrink: 0;
      color: var(--text2);
    }
    .rank-info { flex: 1; min-width: 0; }
    .rank-name {
      font-size: 15px;
      font-weight: 600;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .rank-alias {
      font-size: 12px;
      color: var(--text2);
      margin-top: 1px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .rank-right { text-align: right; flex-shrink: 0; }
    .rank-pts {
      font-size: 24px;
      font-weight: 800;
      color: var(--accent);
      line-height: 1;
    }
    .rank-bd {
      font-size: 10px;
      color: var(--text2);
      margin-top: 3px;
      max-width: 140px;
      text-align: right;
      line-height: 1.4;
    }
    .stats-bar {
      display: flex;
      gap: 8px;
      padding: 12px 14px;
      margin: 0 14px 8px;
    }
    .stat-chip {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 8px 12px;
      flex: 1;
      text-align: center;
    }
    .stat-chip .val {
      font-size: 18px;
      font-weight: 800;
      color: var(--accent);
    }
    .stat-chip .lbl {
      font-size: 10px;
      color: var(--text2);
      margin-top: 2px;
    }
    /* ── MATCHES ── */
    .match-row {
      display: grid;
      grid-template-columns: 1fr 68px 1fr;
      align-items: center;
      padding: 11px 14px;
      border-bottom: 1px solid var(--border);
      gap: 6px;
    }
    .match-row:last-child { border-bottom: none; }
    .team { font-size: 12px; font-weight: 500; line-height: 1.3; }
    .team.home { text-align: right; }
    .team.away { text-align: left; }
    .score-box { text-align: center; }
    .score-live {
      font-size: 19px;
      font-weight: 800;
      color: var(--green);
      letter-spacing: 1px;
    }
    .score-pending {
      font-size: 10px;
      color: var(--text2);
      background: var(--surface2);
      border-radius: 6px;
      padding: 3px 7px;
      display: inline-block;
    }
    /* ── PREDICCIONES ── */
    .selector-wrap {
      margin: 8px 14px 0;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 12px 14px;
    }
    .selector-wrap label {
      font-size: 11px;
      color: var(--text2);
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.8px;
      display: block;
      margin-bottom: 8px;
    }
    .selector-wrap select {
      width: 100%;
      background: var(--surface2);
      border: 1px solid var(--border);
      color: var(--text);
      border-radius: 10px;
      padding: 10px 12px;
      font-size: 15px;
      -webkit-appearance: none;
      appearance: none;
    }
    .pred-cards {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
      margin: 10px 14px;
    }
    .pred-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 11px 13px;
    }
    .pred-card .lbl {
      font-size: 10px;
      text-transform: uppercase;
      letter-spacing: 0.8px;
      color: var(--text2);
      font-weight: 600;
      margin-bottom: 4px;
    }
    .pred-card .val {
      font-size: 14px;
      font-weight: 700;
    }
    .val.correct { color: var(--green); }
    .val.wrong { color: var(--red); }
    .val.pending { color: var(--text2); }
    .pred-row {
      display: grid;
      grid-template-columns: 1fr 70px 1fr;
      align-items: center;
      padding: 9px 14px;
      border-bottom: 1px solid var(--border);
      gap: 4px;
      font-size: 11px;
    }
    .pred-row:last-child { border-bottom: none; }
    .pred-row.exact { background: rgba(16,185,129,0.07); }
    .pred-row.sign-ok { background: rgba(245,158,11,0.06); }
    .pred-center { text-align: center; }
    .pred-score-pred {
      font-size: 15px;
      font-weight: 700;
      line-height: 1;
    }
    .pred-score-real {
      font-size: 10px;
      color: var(--text2);
      margin-top: 3px;
    }
    .badge {
      font-size: 9px;
      font-weight: 800;
      border-radius: 4px;
      padding: 1px 5px;
      display: inline-block;
      margin-top: 3px;
    }
    .badge.exact { background: rgba(16,185,129,0.2); color: var(--green); }
    .badge.sign { background: rgba(245,158,11,0.2); color: var(--accent); }
    .team-label { color: var(--text2); line-height: 1.3; }
    .team-label.r { text-align: right; }
    /* ── LOADING ── */
    .loading {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 60px 20px;
      gap: 14px;
      color: var(--text2);
    }
    .spinner {
      width: 30px; height: 30px;
      border: 3px solid var(--surface2);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }
    /* ── ERROR ── */
    .error-box {
      margin: 16px 14px;
      background: rgba(239,68,68,0.1);
      border: 1px solid rgba(239,68,68,0.25);
      border-radius: var(--radius);
      padding: 14px;
      color: #fca5a5;
      font-size: 13px;
      line-height: 1.5;
    }
    /* ── MISC ── */
    .tip {
      text-align: center;
      font-size: 11px;
      color: var(--text2);
      padding: 10px 16px 4px;
      line-height: 1.5;
    }
  </style>
</head>
<body>
<header class="header">
  <div class="header-left">
    <h1>🏆 Porra Mundial 2026</h1>

  </div>
  <button class="refresh-btn" id="refreshBtn" onclick="loadData(true)" title="Actualizar">↻</button>
</header>

    <div class="loading"><div class="spinner"></div><span>Cargando clasificación...</span></div>

  <div id="tabPartidos" class="tab"></div>
  <div id="tabPredicciones" class="tab"></div>
  <div id="tabMiPorra" class="tab"></div>
</div>
<nav class="bottom-nav">
  <button class="nav-btn active" id="navRanking" onclick="switchTab('Ranking')">
    <span class="icon">🏆</span>Ranking
  </button>
  <button class="nav-btn" id="navPartidos" onclick="switchTab('Partidos')">

  </button>
  <button class="nav-btn" id="navPredicciones" onclick="switchTab('Predicciones')">

  </button>
  <button class="nav-btn" id="navMiPorra" onclick="switchTab('MiPorra')">
    <span class="icon">✏️</span>Mi Porra
  </button>
</nav>
